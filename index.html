function useScrollReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) e.target.classList.add('vis'); }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function Room3DViewer({ room }) {
  const [rotY, setRotY] = useState(-20);
  const [rotX, setRotX] = useState(10);
  const dragging = useRef(false);
  const lastPos = useRef({ x:0, y:0 });

  const onDown = e => {
    dragging.current = true;
    const pt = e.touches ? e.touches[0] : e;
    lastPos.current = { x: pt.clientX, y: pt.clientY };
  };
  const onMove = e => {
    if (!dragging.current) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - lastPos.current.x;
    const dy = pt.clientY - lastPos.current.y;
    setRotY(prev => prev + dx * 0.6);
    setRotX(prev => Math.max(-30, Math.min(30, prev - dy * 0.4)));
    lastPos.current = { x: pt.clientX, y: pt.clientY };
  };
  const onUp = () => { dragging.current = false; };

  useEffect(() => {
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);
    return () => { window.removeEventListener('mouseup', onUp); window.removeEventListener('touchend', onUp); };
  }, []);

  const faces = [
    { cls: "room3d-face--front", label: "Bedroom View", img: room.img },
    { cls: "room3d-face--right", label: "Bathroom", img: room.img2 },
    { cls: "room3d-face--back", label: "Window View", img: room.img3 },
    { cls: "room3d-face--left", label: "Entrance", img: room.img },
    { cls: "room3d-face--top", label: "Ceiling", img: null },
    { cls: "room3d-face--bottom", label: "Floor Plan", img: null },
  ];

  return (
    <div className="room3d-wrap" onMouseDown={onDown} onMouseMove={onMove} onTouchStart={onDown} onTouchMove={onMove} style={{ background: room.lightBg }}>
      <div className="room3d-cube" style={{ transform: `rotateX(${rotX}deg) rotateY(${rotY}deg)` }}>
        {faces.map((f, i) => (
          <div key={i} className={`room3d-face ${f.cls}`} style={{ background: f.img ? 'transparent' : room.color }}>
            {f.img && <img src={f.img} alt={f.label} />}
            <span className="room3d-label">{f.label}</span>
          </div>
        ))}
      </div>
      <div style={{ position:"absolute", bottom:8, left:0, right:0, textAlign:"center", fontSize:10, color:"#999", fontWeight:600, pointerEvents:"none" }}>
        ↔ Drag to rotate 360°
      </div>
    </div>
  );
}

                    {checked && <div style={{ fontSize:14, fontWeight:700, color:room.color, marginTop:6 }}>Total: {fmtINR(room.price * n)}</div>}
                  </div>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:16 }}>
                  {room.amenities.map(a => <span key={a} style={{ background:room.lightBg, color:room.color, fontSize:11, fontWeight:600, padding:"4px 10px", borderRadius:6 }}>✓ {a}</span>)}
                </div>
                {room.meals.length > 0 && <div style={{ marginBottom:16 }}>{room.meals.map(m => <span key={m} style={{ background:"#F0FDF4", color:"#166534", fontSize:11, fontWeight:800, padding:"5px 12px", borderRadius:6, marginRight:8 }}>🍳 {m} Included</span>)}</div>}

                <div style={{ marginBottom:16 }}>

                  <div className="room-avail-grid" style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {room.roomNos.map(no => {
                      const isBooked = bookedNos.includes(no);
                      return (
                        <div key={no} style={{ width:44, height:32, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, background: isBooked ? "#FEE2E2" : "#F0FDF4", color: isBooked ? "#DC2626" : "#166534", border: `1px solid ${isBooked ? "#FECACA" : "#BBF7D0"}` }}>
                          {no}
                        </div>

                    })}
                  </div>
                  <div style={{ display:"flex", gap:14, marginTop:8, fontSize:10, color:"#999" }}>
                    <span>🟢 Available</span><span>🔴 Booked</span>
                  </div>
                </div>

                <div style={{ display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>
                  {checked ? (
                    avail ? <button onClick={currentUser ? () => handleBook(room) : () => setPage("login")} className="shimmer" style={{...S.btn(room.color)}}>Book Now →</button> :
                    <div style={{ color:"#DC2626", fontWeight:700, fontSize:14 }}>✗ No rooms available for selected dates</div>
                  ) : (
                    <button onClick={currentUser ? () => handleBook(room) : () => setPage("login")} className="shimmer" style={{...S.btn(room.color)}}>Book Now →</button>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

//  BOOKING PAGE
// ═══════════════════════════════════════
function BookingPage({ selectedRoom, setPage, setPendingBooking, bookings, currentUser }) {
  const [ci, setCi] = useState(todayStr());
  const [co, setCo] = useState(tomorrowStr());
  const [msg, setMsg] = useState("");
  if (!selectedRoom) { setPage("rooms"); return null; }
  const r = selectedRoom;
  const n = calcNights(ci, co);
  const total = r.price * n;
  const avail = ci && co ? getAvailRoomNo(r.id, ci, co, bookings) : null;

  function proceed() {
    if (!ci || !co) { setMsg("Please select dates."); return; }
    if (new Date(co) <= new Date(ci)) { setMsg("Check-out must be after check-in."); return; }
    if (!avail) { setMsg("No rooms available. Try different dates."); return; }
    setPendingBooking({ roomId:r.id, roomNo:avail, checkIn:ci, checkOut:co, total, nights:n });
    setPage("payment");
  }

  return (
    <div style={{ background:"var(--bg)", minHeight:"80vh", padding:"44px 24px" }}>
      <div style={{ maxWidth:960, margin:"0 auto" }}>
        <span onClick={() => setPage("rooms")} style={{ color:"#888", cursor:"pointer", fontSize:13, fontWeight:600 }}>← Back to Rooms</span>
        <h1 className="playfair" style={{ margin:"10px 0 0", fontSize:32, color:"#1a1a2e", fontWeight:900 }}>Book {r.name}</h1>
        <div className="book-grid" style={{ display:"grid", gridTemplateColumns:"1fr 340px", gap:28, marginTop:24 }}>
          <div>
            <div style={{ ...S.card, padding:28, marginBottom:22 }}>
              <img src={r.img} alt={r.name} style={{ width:"100%", height:220, objectFit:"cover", borderRadius:12, marginBottom:20 }} />
              <h2 className="playfair" style={{ margin:"0 0 8px", color:"#1a1a2e", fontSize:24, fontWeight:800 }}>{r.name}</h2>
              <p style={{ color:"#666", fontSize:14, margin:"0 0 16px", lineHeight:1.6 }}>{r.desc}</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:16 }}>
                {r.amenities.map(a => <span key={a} style={{ background:r.lightBg, color:r.color, fontSize:11, padding:"3px 9px", borderRadius:6, fontWeight:600 }}>✓ {a}</span>)}
              </div>
              {r.meals.length > 0 && <div style={{ background:"#F0FDF4", padding:"10px 14px", borderRadius:8, color:"#166534", fontSize:13, fontWeight:700 }}>🍳 Includes: {r.meals.join(", ")}</div>}
            </div>
            <div style={{ ...S.card, padding:24 }}>
              <h3 style={{ margin:"0 0 20px", color:"#1a1a2e", fontSize:18, fontWeight:800 }}>Select Your Dates</h3>
              <div className="g-2col" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:18 }}>
                <div><label style={S.lbl}>Check-in Date</label><input type="date" value={ci} min={todayStr()} onChange={e => setCi(e.target.value)} style={S.input} /></div>
                <div><label style={S.lbl}>Check-out Date</label><input type="date" value={co} min={ci||todayStr()} onChange={e => setCo(e.target.value)} style={S.input} /></div>
              </div>
              {msg && <div style={{ background:"#FEF2F2", color:"#DC2626", padding:"10px 14px", borderRadius:8, fontSize:13, marginBottom:14, fontWeight:600 }}>{msg}</div>}
              {ci && co && (
                <div style={{ background: avail ? "#F0FDF4" : "#FEF2F2", color: avail ? "#166534" : "#DC2626", padding:"14px 18px", borderRadius:10, fontWeight:700, fontSize:15, display:"flex", alignItems:"center", gap:8 }}>
                  {avail ? `✓ Room #${avail} is available! (Auto-assigned lowest available)` : "✗ No rooms available — try different dates."}
                </div>
              )}
            </div>
          </div>
          <div>
            <div style={{ ...S.card, padding:24, marginBottom:18 }}>
              <h3 style={{ margin:"0 0 18px", color:"#1a1a2e", fontSize:17, fontWeight:800 }}>Booking Summary</h3>
              {[["Room Type",r.name],["Assigned Room", avail ? `#${avail}` : "—"],["Check-in",fmtDate(ci)],["Check-out",fmtDate(co)],["Duration",`${n} night(s)`],["Rate / night",fmtINR(r.price)]].map(([k,v]) =>
                <div key={k} style={{ display:"flex", justifyContent:"space-between", marginBottom:11, fontSize:14 }}>
                  <span style={{ color:"#888" }}>{k}</span><span style={{ fontWeight:600 }}>{v}</span>
                </div>
              )}
              {r.meals.length > 0 && <div style={{ background:"#F0FDF4", color:"#166534", fontSize:11, padding:"7px 12px", borderRadius:6, marginBottom:12, fontWeight:700 }}>Includes: {r.meals.join(", ")}</div>}
              <div style={{ borderTop:"1px solid #eee", paddingTop:14, display:"flex", justifyContent:"space-between", fontSize:22, fontWeight:800, color:"#1a1a2e" }}>
                <span>Total</span><span style={{ color:r.color }}>{fmtINR(total)}</span>

//  PAYMENT PAGE
// ═══════════════════════════════════════
function PaymentPage({ pendingBooking, selectedRoom, handleConfirmBooking, setPage, points }) {
  const [method, setMethod] = useState("");
  const [cn, setCn] = useState("");
  const [cvv, setCvv] = useState("");
  const [exp, setExp] = useState("");
  const [name, setName] = useState("");
  const [upi, setUpi] = useState("");
  const [tab, setTab] = useState("card");
  const [proc, setProc] = useState(false);
  const [useCoupon, setUseCoupon] = useState(false);

  if (!pendingBooking || !selectedRoom) return null;
  const r = selectedRoom;
  const canUseCoupon = points >= 3000;
  const discountAmt = useCoupon && canUseCoupon ? Math.floor(pendingBooking.total / 2) : 0;
  const finalTotal = pendingBooking.total - discountAmt;

  function pay() {
    if (!method) return;
    if (method === "online") {
      if (tab === "card" && (!cn || !cvv || !exp || !name)) return;
      if (tab === "upi" && !upi) return;
    }
    setProc(true);
    setTimeout(() => { handleConfirmBooking(method, useCoupon && canUseCoupon); setProc(false); }, 1800);
  }

  return (
    <div style={{ background:"var(--bg)", minHeight:"80vh", padding:"44px 24px" }}>
      <div style={{ maxWidth:840, margin:"0 auto" }}>
        <span onClick={() => setPage("book")} style={{ color:"#888", cursor:"pointer", fontSize:13, fontWeight:600 }}>← Back to Booking</span>
        <h1 className="playfair" style={{ margin:"10px 0 28px", fontSize:32, color:"#1a1a2e", fontWeight:900 }}>Secure Payment</h1>
        <div className="pay-grid" style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:28 }}>
          <div>
            {/* Payment Methods */}
            <div style={{ ...S.card, padding:26, marginBottom:18 }}>
              <h3 style={{ margin:"0 0 18px", color:"#1a1a2e", fontSize:17, fontWeight:800 }}>Payment Method</h3>
              <div className="g-pay-methods" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:24 }}>
                {[["online","Pay Online","💳","Card / UPI"],["hotel","Pay at Hotel","🏨","Cash or Card"]].map(([v,l,ic,sub]) =>
                  <div key={v} onClick={() => setMethod(v)} style={{ border:`2px solid ${method===v ? r.color : "#e5e5e5"}`, borderRadius:14, padding:"18px 14px", cursor:"pointer", background: method===v ? r.lightBg : "#fafafa", transition:"all .2s", textAlign:"center" }}>
                    <div style={{ fontSize:28, marginBottom:8 }}>{ic}</div>
                    <div style={{ fontWeight:700, color: method===v ? r.color : "#333", fontSize:15 }}>{l}</div>
                    <div style={{ fontSize:11, color:"#999", marginTop:4 }}>{sub}</div>
                  </div>
                )}
              </div>

              {/* Loyalty Coupon */}
              {canUseCoupon && (
                <div onClick={() => setUseCoupon(!useCoupon)} style={{ border:`2px solid ${useCoupon ? "#059669" : "#e5e5e5"}`, borderRadius:14, padding:"16px 18px", cursor:"pointer", background: useCoupon ? "#F0FDF4" : "#fafafa", transition:"all .2s", marginBottom:24, display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ width:24, height:24, borderRadius:6, border:`2px solid ${useCoupon ? "#059669" : "#ccc"}`, background: useCoupon ? "#059669" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    {useCoupon && <span style={{color:"#fff", fontWeight:800, fontSize:14}}>✓</span>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:700, color: useCoupon ? "#059669" : "#333", fontSize:14 }}>🎫 Apply 50% Loyalty Discount</div>
                    <div style={{ fontSize:12, color:"#888", marginTop:2 }}>Use 3,000 points for {fmtINR(Math.floor(pendingBooking.total/2))} off (one-time use)</div>
                  </div>
                  <div style={{ fontWeight:800, fontSize:18, color:"#059669" }}>-{fmtINR(Math.floor(pendingBooking.total/2))}</div>
                </div>
              )}

              {method === "online" && (
                <div>
                  <div style={{ display:"flex", gap:0, marginBottom:22, borderRadius:10, overflow:"hidden", border:"1px solid #e5e5e5" }}>
                    {[["card","💳 Card"],["upi","📱 UPI"]].map(([t,l]) =>
                      <button key={t} onClick={() => setTab(t)} style={{ flex:1, padding:"10px", border:"none", background: tab===t ? "#1a1a2e" : "#fff", color: tab===t ? "#fff" : "#333", fontWeight:700, cursor:"pointer", fontSize:14 }}>{l}</button>
                    )}
                  </div>
                  {tab === "card" && (
                    <div>
                      <div style={{marginBottom:14}}><label style={S.lbl}>Cardholder Name</label><input value={name} onChange={e => setName(e.target.value)} placeholder="As on card" style={S.input} /></div>
                      <div style={{marginBottom:14}}><label style={S.lbl}>Card Number</label><input value={cn} onChange={e => setCn(e.target.value.replace(/\D/g,"").slice(0,16))} placeholder="1234 5678 9012 3456" style={S.input} /></div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                        <div><label style={S.lbl}>Expiry (MM/YY)</label><input value={exp} onChange={e => setExp(e.target.value)} placeholder="12/28" style={S.input} /></div>
                        <div><label style={S.lbl}>CVV</label><input value={cvv} onChange={e => setCvv(e.target.value.replace(/\D/g,"").slice(0,3))} placeholder="•••" type="password" style={S.input} /></div>
                      </div>
                    </div>
                  )}
                  {tab === "upi" && (
                    <div><label style={S.lbl}>UPI ID</label><input value={upi} onChange={e => setUpi(e.target.value)} placeholder="yourname@upi" style={S.input} /></div>
                  )}
                  <div style={{ background:"#F0FDF4", border:"1px solid #BBF7D0", borderRadius:10, padding:"12px 16px", fontSize:13, color:"#166534", marginTop:16, display:"flex", alignItems:"center", gap:8 }}>
                    🔒 256-bit SSL encrypted · PCI DSS compliant
                  </div>
                </div>
              )}
              {method === "hotel" && (
                <div style={{ background:"#FFF7ED", border:"1px solid #FED7AA", borderRadius:12, padding:20, fontSize:14 }}>
                  <div style={{ fontWeight:800, color:"#C2410C", marginBottom:12, fontSize:16 }}>Pay at Check-in</div>
                  <div style={{ color:"#7C2D12", lineHeight:2.1 }}>
                    ✓ Full payment at hotel check-in<br/>
                    ✓ Cash, Card, UPI accepted<br/>
                    ✓ Arrive by 2:00 PM on check-in<br/>
                    ⚠ Booking released if no arrival by 6 PM
                  </div>
                </div>
              )}
            </div>
          </div>
          <div>
            <div style={{ ...S.card, padding:24 }}>
              <h3 style={{ margin:"0 0 16px", color:"#1a1a2e", fontSize:17, fontWeight:800 }}>Order Summary</h3>
              <img src={r.img} alt="" style={{ width:"100%", height:130, objectFit:"cover", borderRadius:10, marginBottom:16 }} />
              <div style={{ fontSize:16, fontWeight:800, color:"#1a1a2e", marginBottom:14 }}>{r.name}</div>
              {[["Room No",`#${pendingBooking.roomNo}`],["Check-in",fmtDate(pendingBooking.checkIn)],["Check-out",fmtDate(pendingBooking.checkOut)],["Nights",pendingBooking.nights],["Rate",fmtINR(r.price)+"/night"]].map(([k,v]) =>
                <div key={k} style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:9 }}>
                  <span style={{ color:"#888" }}>{k}</span><span style={{ fontWeight:600 }}>{v}</span>
                </div>
              )}
              {r.meals.length > 0 && <div style={{ background:"#F0FDF4", color:"#166534", fontSize:11, padding:"7px 10px", borderRadius:6, marginBottom:10, fontWeight:700 }}>🍳 {r.meals.join(" + ")} included</div>}

              {useCoupon && canUseCoupon && (
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:9, color:"#059669", fontWeight:700 }}>
                  <span>🎫 Loyalty Discount</span><span>-{fmtINR(discountAmt)}</span>
                </div>
              )}

              <div style={{ borderTop:"1px solid #eee", paddingTop:14, marginTop:6 }}>
                {useCoupon && canUseCoupon && (
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6, color:"#999", textDecoration:"line-through" }}>
                    <span>Original</span><span>{fmtINR(pendingBooking.total)}</span>
                  </div>
                )}
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:20, fontWeight:800 }}>
                  <span>Total</span><span style={{ color:r.color }}>{fmtINR(finalTotal)}</span>
                </div>
              </div>

              <button onClick={pay} disabled={!method || proc} className="shimmer" style={{ ...S.btn(method ? r.color : "#ccc"), width:"100%", padding:"14px", fontSize:15, marginTop:18, borderRadius:12, opacity: proc ? 0.7 : 1, cursor: method ? "pointer" : "not-allowed" }}>
                {proc ? "Processing…" : method === "hotel" ? "Confirm Booking" : `Pay ${fmtINR(finalTotal)}`}
              </button>
              {!method && <p style={{ textAlign:"center", color:"#bbb", fontSize:12, marginTop:8 }}>Select a payment method above</p>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function BookingRow({ b, faded }) {

  const isUp = b.checkOut >= todayStr();
  return (

function SignupPage({ handleSignup, setPage }) {
  const [f, setF] = useState({ name:"", contact:"", email:"", password:"", confirm:"" });
  const [err, setErr] = useState("");
  const [otpSent, setOtpSent] = useState(false);
  const [generatedOtp, setGeneratedOtp] = useState("");
  const [enteredOtp, setEnteredOtp] = useState("");
  const [otpErr, setOtpErr] = useState("");
  const [timer, setTimer] = useState(0);
  const set = k => e => setF({...f, [k]: e.target.value });

  // OTP timer
  useEffect(() => {
    if (timer > 0) {
      const t = setTimeout(() => setTimer(timer - 1), 1000);
      return () => clearTimeout(t);
    }
  }, [timer]);

  function sendOtp() {
    if (!f.name || !f.contact || !f.email || !f.password) { setErr("All fields are required."); return; }
    if (!/^\+?[0-9]{10,13}$/.test(f.contact.replace(/\s/g, ""))) { setErr("Enter a valid contact number."); return; }
    if (!/\S+@\S+\.\S+/.test(f.email)) { setErr("Enter a valid email."); return; }
    if (f.password.length < 6) { setErr("Password must be at least 6 characters."); return; }
    if (f.password !== f.confirm) { setErr("Passwords do not match."); return; }
    setErr("");
    const otp = String(Math.floor(100000 + Math.random() * 900000));
    setGeneratedOtp(otp);
    setOtpSent(true);
    setTimer(60);
    setEnteredOtp("");
    setOtpErr("");
    console.log("OTP for demo:", otp);
  }

  function verifyOtp() {
    if (enteredOtp === generatedOtp) {
      setOtpErr("");
      handleSignup({ name:f.name, contact:f.contact, email:f.email, password:f.password });
    } else {
      setOtpErr("Invalid OTP. Please try again.");
    }
  }

  function resendOtp() {
    const otp = String(Math.floor(100000 + Math.random() * 900000));
    setGeneratedOtp(otp);
    setTimer(60);
    setEnteredOtp("");
    setOtpErr("");
    console.log("New OTP for demo:", otp);
  }

  return (
    <div style={{ minHeight:"80vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:"var(--bg)" }}>
      <div className="auth-card" style={{ ...S.card, width:"100%", maxWidth:460, padding:"42px 36px" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ background:"#1a1a2e", width:52, height:52, borderRadius:14, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", fontSize:22 }}>⭐</div>
          <h2 className="playfair" style={{ margin:0, fontSize:26, color:"#1a1a2e", fontWeight:900 }}>Create Your Account</h2>
          <p style={{ color:"#888", fontSize:14, margin:"8px 0 0" }}>Join {HOTEL} family</p>
        </div>
        {err && <div style={{ background:"#FEF2F2", color:"#DC2626", padding:"10px 14px", borderRadius:8, fontSize:13, marginBottom:16, fontWeight:600 }}>{err}</div>}

        {!otpSent ? (
          <div>
            {[["Full Name","text","name","Your full name"],["Contact Number","tel","contact","+91 98765 43210"],["Email Address","email","email","you@example.com"],["Password","password","password","Minimum 6 characters"],["Confirm Password","password","confirm","Repeat password"]].map(([l,t,k,ph]) =>
              <div key={k} style={{ marginBottom:16 }}>
                <label style={S.lbl}>{l}</label>
                <input type={t} value={f[k]} onChange={set(k)} placeholder={ph} style={S.input} onKeyDown={e => e.key==="Enter" && sendOtp()} />
              </div>
            )}
            <button onClick={sendOtp} className="shimmer" style={{ ...S.btn("#1a1a2e"), width:"100%", padding:"14px", fontSize:16, marginTop:6, borderRadius:12 }}>Send OTP & Create Account</button>
          </div>
        ) : (
          <div>
            {/* OTP Verification */}
            <div style={{ background:"linear-gradient(135deg, #F0FDF4, #ECFDF5)", borderRadius:14, padding:"24px 20px", textAlign:"center", marginBottom:20, border:"1px solid #BBF7D0" }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📱</div>
              <div style={{ fontWeight:800, color:"#166534", fontSize:15, marginBottom:6 }}>OTP Sent!</div>
              <div style={{ color:"#059669", fontSize:13 }}>A 6-digit verification code has been sent to</div>
              <div style={{ fontWeight:800, color:"#1a1a2e", fontSize:14, marginTop:4 }}>{f.contact}</div>
              <div style={{ background:"#FFFBEB", borderRadius:8, padding:"8px 14px", marginTop:12, display:"inline-block" }}>
                <span style={{ fontSize:11, color:"#92400E", fontWeight:700 }}>💡 Demo Mode: OTP is <strong style={{ color:"#DC2626", fontSize:16, letterSpacing:4 }}>{generatedOtp}</strong></span>
              </div>
            </div>

            <div style={{ marginBottom:18 }}>
              <label style={S.lbl}>Enter 6-Digit OTP</label>
              <input type="text" value={enteredOtp} onChange={e => setEnteredOtp(e.target.value.replace(/\D/g, "").slice(0, 6))} placeholder="000000" maxLength={6} style={{ ...S.input, fontSize:24, textAlign:"center", letterSpacing:12, fontWeight:800 }} onKeyDown={e => e.key==="Enter" && verifyOtp()} />
            </div>

            {otpErr && <div style={{ background:"#FEF2F2", color:"#DC2626", padding:"10px 14px", borderRadius:8, fontSize:13, marginBottom:16, fontWeight:600 }}>{otpErr}</div>}

            <button onClick={verifyOtp} className="shimmer" style={{ ...S.btn("#059669"), width:"100%", padding:"14px", fontSize:16, borderRadius:12, marginBottom:12 }}>✓ Verify & Create Account</button>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <button onClick={() => setOtpSent(false)} style={{ ...S.outBtn("#999"), padding:"8px 16px", fontSize:12, borderRadius:8 }}>← Back</button>
              {timer > 0 ? (
                <span style={{ fontSize:12, color:"#888", fontWeight:600 }}>Resend in {timer}s</span>
              ) : (
                <button onClick={resendOtp} style={{ ...S.outBtn("#2563EB"), padding:"8px 16px", fontSize:12, borderRadius:8 }}>🔄 Resend OTP</button>
              )}
            </div>
          </div>
        )}

        <p style={{ textAlign:"center", marginTop:20, fontSize:14, color:"#888" }}>Already have an account? <span onClick={() => setPage("login")} style={{ color:"#B8860B", cursor:"pointer", fontWeight:700 }}>Sign In</span></p>
      </div>
    </div>
  );
}

  return (
    <div style={{ minHeight:"80vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:"var(--bg)" }}>
      <div className="auth-card" style={{ ...S.card, width:"100%", maxWidth:420, padding:"42px 36px" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ background:"#1a1a2e", width:52, height:52, borderRadius:14, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", fontSize:22 }}>⭐</div>
          <h2 className="playfair" style={{ margin:0, fontSize:26, color:"#1a1a2e", fontWeight:900 }}>Welcome Back</h2>
          <p style={{ color:"#888", fontSize:14, margin:"8px 0 0" }}>Sign in to your account</p>
        </div>
        {err && <div style={{ background:"#FEF2F2", color:"#DC2626", padding:"10px 14px", borderRadius:8, fontSize:13, marginBottom:16, fontWeight:600 }}>{err}</div>}
        <div style={{ marginBottom:18 }}>
          <label style={S.lbl}>Email Address</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" style={S.input} />
        </div>
        <div style={{ marginBottom:24 }}>
          <label style={S.lbl}>Password</label>
          <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" style={S.input} onKeyDown={e => e.key==="Enter" && submit()} />
        </div>
        <button onClick={submit} className="shimmer" style={{ ...S.btn("#1a1a2e"), width:"100%", padding:"14px", fontSize:16, borderRadius:12 }}>Sign In</button>
        <p style={{ textAlign:"center", marginTop:20, fontSize:14, color:"#888" }}>Don't have an account? <span onClick={() => setPage("signup")} style={{ color:"#B8860B", cursor:"pointer", fontWeight:700 }}>Sign Up</span></p>
        <div style={{ background:"#f8f6f0", borderRadius:10, padding:"12px 16px", marginTop:18, fontSize:12, color:"#999", textAlign:"center" }}>
          New here? Sign up to create your guest account — bookings saved automatically.
        </div>
        {/* Owner Login Link */}
        <div onClick={() => setPage("ownerLogin")} style={{ marginTop:18, padding:"14px 18px", borderRadius:10, border:"1.5px dashed #DC2626", background:"#FEF2F2", cursor:"pointer", textAlign:"center", transition:"all .2s" }}>
          <div style={{ fontSize:13, fontWeight:800, color:"#DC2626" }}>👑 Hotel Owner?</div>
          <div style={{ fontSize:11, color:"#999", marginTop:2 }}>Access the Owner Admin Dashboard</div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
function OwnerLoginPage({ setPage, handleOwnerLogin }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");

  function submit() {
    if (!email || !pw) { setErr("Please fill in all fields."); return; }
    if (email !== OWNER_EMAIL || pw !== OWNER_PASSWORD) {
      setErr("Invalid owner credentials.");
      return;
    }
    setErr("");
    handleOwnerLogin();
  }

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:"linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 50%, #2a1a1e 100%)" }}>
      <div className="auth-card" style={{ ...S.card, width:"100%", maxWidth:440, padding:"42px 36px", border:"1px solid rgba(220,38,38,0.15)" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ background:"linear-gradient(135deg, #DC2626, #EF4444)", width:60, height:60, borderRadius:16, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", fontSize:26, boxShadow:"0 6px 24px rgba(220,38,38,0.3)" }}>👑</div>
          <h2 className="playfair" style={{ margin:0, fontSize:28, color:"#1a1a2e", fontWeight:900 }}>Owner Login</h2>
          <p style={{ color:"#888", fontSize:13, margin:"10px 0 0" }}>Authorized access to hotel management</p>
        </div>
        {err && <div style={{ background:"#FEF2F2", color:"#DC2626", padding:"10px 14px", borderRadius:8, fontSize:13, marginBottom:16, fontWeight:600 }}>{err}</div>}
        <div style={{ marginBottom:18 }}>
          <label style={S.lbl}>Owner Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="owner@hotel.com" style={S.input} />
        </div>
        <div style={{ marginBottom:24 }}>
          <label style={S.lbl}>Password</label>
          <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" style={S.input} onKeyDown={e => e.key==="Enter" && submit()} />
        </div>
        <button onClick={submit} className="shimmer" style={{ ...S.btn("linear-gradient(135deg, #DC2626, #EF4444)"), width:"100%", padding:"14px", fontSize:16, borderRadius:12 }}>Access Admin Panel</button>
        <p style={{ textAlign:"center", marginTop:20, fontSize:13, color:"#888" }}>
          <span onClick={() => setPage("login")} style={{ color:"#B8860B", cursor:"pointer", fontWeight:700 }}>← Back to Guest Login</span>
        </p>
        <div style={{ background:"#FEF2F2", borderRadius:10, padding:"12px 16px", marginTop:16, fontSize:11, color:"#DC2626", textAlign:"center", fontWeight:600 }}>
          🔒 This area is restricted to hotel owners only
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("signup");
  const [currentUser, setCurrentUser] = useState(null);
  const [users, setUsers] = useState([]);
  const [bookings, setBookings] = useState(SEED_BOOKINGS);
  const [selectedRoom, setSelectedRoom] = useState(null);
  const [pendingBooking, setPendingBooking] = useState(null);
  const [toast, setToast] = useState(null);
  const [points, setPoints] = useState(0);
  const [isOwner, setIsOwner] = useState(false);
  const [rooms, setRooms] = useState(DEFAULT_ROOMS);
  const [smsNotif, setSmsNotif] = useState(null);

  // Persistence
  useEffect(() => {
    try {
      const u = localStorage.getItem("gm_users");
      if (u) setUsers(JSON.parse(u));
      const b = localStorage.getItem("gm_bookings");
      if (b) {
        const userBookings = JSON.parse(b);
        setBookings([...userBookings]);
      }
      const cu = localStorage.getItem("gm_session");
      if (cu) {
        const user = JSON.parse(cu);
        setCurrentUser(user);
        // Calc points
        const allB = [...(b ? JSON.parse(b) : [])];
        const myB = allB.filter(bk => bk.userId === user.id);
        const earned = myB.reduce((acc, bk) => acc + Math.floor(bk.total / 10), 0);
        const used = user.usedPoints || 0;
        setPoints(Math.max(0, earned - used));
      }
      const ownerSession = localStorage.getItem("gm_owner");
      if (ownerSession === "true") {
        setIsOwner(true);
        setPage("ownerDash");
      }
      const savedRooms = localStorage.getItem("gm_rooms");
      if (savedRooms) {
        const parsed = JSON.parse(savedRooms);
        setRooms(parsed);
        ROOMS = parsed;
      }
    } catch {}
  }, []);

  function saveUsers(nu) { setUsers(nu); localStorage.setItem("gm_users", JSON.stringify(nu)); }
  function saveBookings(nb) {
    setBookings(nb);
    localStorage.setItem("gm_bookings", JSON.stringify(nb));
  }
  function updateRooms(nr) { setRooms(nr); ROOMS = nr; localStorage.setItem("gm_rooms", JSON.stringify(nr)); }
  function setSession(u) { setCurrentUser(u); localStorage.setItem("gm_session", JSON.stringify(u)); }
  function clearSession() { setCurrentUser(null); localStorage.removeItem("gm_session"); }

  function showToast(msg, type="success") { setToast({msg,type}); setTimeout(() => setToast(null), 3800); }

  const nav = p => { setPage(p); window.scrollTo(0,0); };

  function handleSignup({ name, email, contact, password }) {
    if (users.find(u => u.email === email)) { showToast("Email already registered!", "error"); return; }
    const nu = { id:`u_${Date.now()}`, name, email, contact, password, usedPoints:0 };
    saveUsers([...users, nu]);
    setSession(nu);
    setPoints(0);
    showToast(`Welcome, ${name}! Account created.`);
    nav("landing");
  }

  function handleLogin({ email, password }) {
    const u = users.find(u => u.email === email && u.password === password);
    if (!u) { showToast("Invalid email or password.", "error"); return; }
    setSession(u);
    // Calc points
    const myB = bookings.filter(bk => bk.userId === u.id);
    const earned = myB.reduce((acc, bk) => acc + Math.floor(bk.total / 10), 0);
    setPoints(Math.max(0, earned - (u.usedPoints || 0)));
    showToast(`Welcome back, ${u.name}!`);
    nav("landing");
  }

  function handleLogout() { clearSession(); setPoints(0); nav("landing"); showToast("Logged out successfully."); }

  function handleOwnerLogin() {
    setIsOwner(true);
    localStorage.setItem("gm_owner", "true");
    showToast("Welcome, Owner! Admin panel loaded.");
    nav("ownerDash");
  }

  function handleOwnerLogout() {
    setIsOwner(false);
    localStorage.removeItem("gm_owner");
    showToast("Owner logged out.");
    nav("landing");
  }

  function handleBook(room) {
    if (!currentUser) { nav("login"); return; }
    setSelectedRoom(room);
    nav("book");
  }

  function handleConfirmBooking(payMethod, usedCoupon) {
    if (!pendingBooking) return;
    const roomNo = getAvailRoomNo(pendingBooking.roomId, pendingBooking.checkIn, pendingBooking.checkOut, bookings);
    if (!roomNo) { showToast("No rooms available!", "error"); return; }

    const discountedTotal = usedCoupon ? Math.floor(pendingBooking.total / 2) : pendingBooking.total;
    const nb = {
      ...pendingBooking, id:`bk_${Date.now()}`, roomNo, userId:currentUser.id,
      guestName:currentUser.name, status:"confirmed", payMethod,
      total: discountedTotal, discounted: usedCoupon, bookedAt: new Date().toISOString()
    };
    const newBookings = [...bookings, nb];
    saveBookings(newBookings);

    // Update points
    const newEarned = Math.floor(discountedTotal / 10);
    let newUsedPoints = currentUser.usedPoints || 0;
    if (usedCoupon) newUsedPoints += 3000;

    const updatedUser = { ...currentUser, usedPoints: newUsedPoints };
    const updatedUsers = users.map(u => u.id === updatedUser.id ? updatedUser : u);
    saveUsers(updatedUsers);
    setSession(updatedUser);

    // Recalc points
    const myB = newBookings.filter(bk => bk.userId === updatedUser.id);
    const totalEarned = myB.reduce((acc, bk) => acc + Math.floor(bk.total / 10), 0);
    setPoints(Math.max(0, totalEarned - newUsedPoints));

    setPendingBooking(null);
    // SMS Notification
    const room = ROOMS.find(r => r.id === nb.roomId);
    setSmsNotif({
      to: currentUser.contact,
      name: currentUser.name,
      roomName: room?.name || nb.roomId,
      roomNo: roomNo,
      checkIn: nb.checkIn,
      checkOut: nb.checkOut,
      total: discountedTotal,
      payMethod
    });
    showToast(`Booking confirmed! Room #${roomNo} assigned 🎉`);
    nav("dashboard");
  }

  const props = { page, setPage:nav, currentUser, users, bookings, rooms, selectedRoom, setSelectedRoom, pendingBooking, setPendingBooking, handleSignup, handleLogin, handleLogout, handleBook, handleConfirmBooking, showToast, points, isOwner, handleOwnerLogin, handleOwnerLogout };

  // SMS Notification Modal
  function SmsNotifModal() {
    if (!smsNotif) return null;
    return (
      <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }} onClick={() => setSmsNotif(null)}>
        <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:440, padding:0, overflow:"hidden", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
          {/* SMS Header */}
          <div style={{ background:"linear-gradient(135deg, #059669, #10B981)", padding:"24px 28px", color:"#fff" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
              <div style={{ width:44, height:44, borderRadius:12, background:"rgba(255,255,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>📱</div>
              <div>
                <div style={{ fontWeight:800, fontSize:16 }}>SMS Notification Sent!</div>
                <div style={{ fontSize:12, opacity:0.9 }}>Booking confirmation delivered</div>
              </div>
            </div>
          </div>
          {/* SMS Body */}
          <div style={{ padding:"24px 28px" }}>
            <div style={{ background:"#F0FDF4", border:"1px solid #BBF7D0", borderRadius:12, padding:"18px 16px", marginBottom:18 }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#059669", marginBottom:8, textTransform:"uppercase", letterSpacing:1 }}>Message sent to {smsNotif.to}</div>
              <div style={{ fontFamily:"monospace", fontSize:13, color:"#1a1a2e", lineHeight:1.8, whiteSpace:"pre-wrap" }}>{`${HOTEL}\n\nDear ${smsNotif.name},\n\nYour booking is confirmed! 🎉\n\n📍 Room: ${smsNotif.roomName}\n🔑 Room No: #${smsNotif.roomNo}\n📅 Check-in: ${fmtDate(smsNotif.checkIn)}\n📅 Check-out: ${fmtDate(smsNotif.checkOut)}\n💰 Total: ${fmtINR(smsNotif.total)}\n💳 Payment: ${smsNotif.payMethod === "online" ? "Paid Online" : "Pay at Hotel"}\n\nThank you for choosing ${HOTEL}!\nWe look forward to your stay.\n\n📞 Contact: +91 80 4000 1234`}</div>
            </div>
            <div style={{ background:"#FFFBEB", borderRadius:8, padding:"10px 14px", marginBottom:18, fontSize:11, color:"#92400E", fontWeight:600 }}>
              💡 In production, this SMS would be delivered via Twilio/MSG91 API to the customer's registered phone number.
            </div>
            <button onClick={() => setSmsNotif(null)} className="shimmer" style={{ ...S.btn("#059669"), width:"100%", padding:14, fontSize:15, borderRadius:12 }}>✓ Got it!</button>
          </div>
        </div>
      </div>
    );
  }

  // If owner is logged in and on owner page, show owner dashboard
  if (isOwner && page === "ownerDash") {
    return (
      <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
        {toast && <Toast {...toast} />}
        <SmsNotifModal />
        <OwnerDashboard bookings={bookings} users={users} rooms={rooms} updateRooms={updateRooms} setPage={nav} handleOwnerLogout={handleOwnerLogout} showToast={showToast} />
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      <Navbar {...props} />
      {toast && <Toast {...toast} />}
      <SmsNotifModal />
      {page === "landing" && <LandingPage {...props} />}
      {page === "login" && <LoginPage {...props} />}
      {page === "signup" && <SignupPage {...props} />}
      {page === "ownerLogin" && <OwnerLoginPage setPage={nav} handleOwnerLogin={handleOwnerLogin} />}
      {page === "rooms" && <RoomsPage {...props} />}
      {page === "book" && <BookingPage {...props} />}
      {page === "payment" && <PaymentPage {...props} />}
      {page === "dashboard" && <DashboardPage {...props} />}
      {page === "amenities" && <AmenitiesPage {...props} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
