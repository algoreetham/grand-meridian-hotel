    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        --gold: #B8860B;
        --gold-light: #D4A843;

      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      .playfair { font-family: 'Playfair Display', serif; }
      button { cursor: pointer; border: none; font-family: inherit; }
      input, select { font-family: inherit; }
      img { display: block; }

      /* Scroll Reveal */
      .sr { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1); }
      .sr.vis { opacity: 1; transform: translateY(0); }
      .sr-d1 { transition-delay: 0.1s; }
      .sr-d2 { transition-delay: 0.2s; }
      .sr-d3 { transition-delay: 0.3s; }
      .sr-d4 { transition-delay: 0.4s; }

      /* 3D Room Viewer */
      .room3d-wrap { perspective: 800px; width: 100%; height: 210px; overflow: hidden; cursor: grab; user-select: none; }
      .room3d-wrap:active { cursor: grabbing; }
      .room3d-cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.1s linear; }
      .room3d-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; padding: 16px; text-align: center; border-radius: 0; }
      .room3d-face img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
      .room3d-face .room3d-label { position: relative; z-index: 2; background: rgba(0,0,0,0.55); padding: 6px 14px; border-radius: 6px; font-size: 11px; }
      .room3d-face--front  { transform: rotateY(0deg) translateZ(150px); }
      .room3d-face--right  { transform: rotateY(90deg) translateZ(150px); }
      .room3d-face--back   { transform: rotateY(180deg) translateZ(150px); }
      .room3d-face--left   { transform: rotateY(-90deg) translateZ(150px); }
      .room3d-face--top    { transform: rotateX(90deg) translateZ(105px); }
      .room3d-face--bottom { transform: rotateX(-90deg) translateZ(105px); }

      /* Toast */
      .toast-enter { animation: toastIn 0.4s ease; }
      @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 7px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

      /* Shimmer on hover */
      .shimmer { position: relative; overflow: hidden; }
      .shimmer::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s; }
      .shimmer:hover::after { left: 100%; }

      /* Progress bar for loyalty */
      .loyalty-bar { height: 8px; background: #e5e5e5; border-radius: 99px; overflow: hidden; }
      .loyalty-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 99px; transition: width 1s ease; }

      /* Hamburger */
      .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }

      .mob-menu { display: none; }

      @media (max-width: 768px) {
        .hamburger { display: block; }

        .mob-menu {

        }
        .mob-menu .mob-btn {

        }

        /* Grid overrides */
        .g-stats { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
        .g-rooms { grid-template-columns: 1fr !important; }
        .g-loyalty { grid-template-columns: 1fr !important; }

        .room-row-img { flex: unset !important; width: 100% !important; min-height: 200px !important; max-height: 220px !important; }
        .room-row-body { padding: 20px 16px !important; }

        .hero-title { font-size: 32px !important; }
        .hero-sub { font-size: 14px !important; }

const overlap = (aIn,aOut,bIn,bOut) => aIn < bOut && aOut > bIn;

function getBookedRoomNos(roomId, ci, co, bookings) {
  return bookings.filter(b => b.roomId === roomId && b.status === "confirmed" && overlap(ci, co, b.checkIn, b.checkOut)).map(b => b.roomNo);
}
function getAvailRoomNo(roomId, ci, co, bookings) {
  const room = ROOMS.find(r => r.id === roomId);
