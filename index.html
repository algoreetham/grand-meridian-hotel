<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Meridian — 5-Star Luxury Hotel, Bengaluru</title>
    <meta name="description" content="Experience true luxury at The Grand Meridian. Premium rooms from ₹1,000/night with world-class amenities in Bengaluru.">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --dark: #1a1a2e;
        --darker: #0f0f1e;
        --gold: #B8860B;
        --gold-light: #D4A843;
        --gold-glow: rgba(184,134,11,0.3);
        --bg: #f8f6f0;
        --card: #ffffff;
        --text: #222;
        --text-dim: #666;
        --text-muted: #999;
        --border: #e8e4dc;
        --success: #059669;
        --error: #DC2626;
        --blue: #2563EB;
        --pink: #DB2777;
        --purple: #7C3AED;
        --amber: #B45309;
      }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      .playfair { font-family: 'Playfair Display', serif; }
      button { cursor: pointer; border: none; font-family: inherit; }
// ═══════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════
function App() {
  const [page, setPage] = React.useState("landing");
  const [currentUser, setCurrentUser] = React.useState(null);
  const [bookings, setBookings] = React.useState(SEED_BOOKINGS);
  const [selectedRoom, setSelectedRoom] = React.useState(null);
  const [pendingBooking, setPendingBooking] = React.useState(null);
  const [points, setPoints] = React.useState(0);

  const nav = p => { setPage(p); window.scrollTo(0,0); };

  function handleSignup(u) { setCurrentUser(u); nav("landing"); }
  function handleLogin(u) { setCurrentUser({ ...u, name: "Guest" }); nav("landing"); }
  function handleLogout() { setCurrentUser(null); nav("landing"); }
  function handleBook(r) { setSelectedRoom(r); nav("book"); }
  function handleConfirmBooking(method, disc) {
    const nb = { ...pendingBooking, id:Date.now(), userId:currentUser?.email, guestName:currentUser?.name, payMethod:method };
    setBookings([...bookings, nb]);
    setPendingBooking(null);
    nav("dashboard");
  }

  const props = { page, setPage:nav, currentUser, bookings, selectedRoom, pendingBooking, setPendingBooking, handleSignup, handleLogin, handleLogout, handleBook, handleConfirmBooking, points };

  return (
    <div style={{ minHeight:"100vh" }}>
      <Navbar {...props} />
      {page === "landing" && <LandingPage {...props} />}
      {page === "login" && <LoginPage {...props} />}
      {page === "signup" && <SignupPage {...props} />}
      {page === "rooms" && <RoomsPage {...props} />}
      {page === "book" && <BookingPage {...props} />}
      {page === "payment" && <PaymentPage {...props} />}
      {page === "dashboard" && <DashboardPage {...props} />}
      {page === "amenities" && <AmenitiesPage {...props} />}
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
