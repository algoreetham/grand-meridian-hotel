<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Meridian — 5-Star Luxury Hotel, Bengaluru</title>
    <meta name="description" content="Experience true luxury at The Grand Meridian. Premium rooms from ₹1,000/night with world-class amenities in Bengaluru.">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --dark: #1a1a2e; --darker: #0f0f1e; --gold: #B8860B; --gold-light: #D4A843; --gold-glow: rgba(184,134,11,0.3); --bg: #f8f6f0; --card: #ffffff; --text: #222; --text-dim: #666; --text-muted: #999; --border: #e8e4dc; --success: #059669; --error: #DC2626; --blue: #2563EB; --pink: #DB2777; --purple: #7C3AED; --amber: #B45309;
      }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      .playfair { font-family: 'Playfair Display', serif; }
      button { cursor: pointer; border: none; font-family: inherit; }
      input, select { font-family: inherit; }
      img { display: block; }
      .sr { opacity: 0; transform: translateY(28px); transition: 0.7s ease-out; }
      .sr.vis { opacity: 1; transform: translateY(0); }
      .room3d-wrap { perspective: 800px; width: 100%; height: 210px; overflow: hidden; cursor: grab; user-select: none; position: relative; }
      .room3d-cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.1s linear; }
      .room3d-face { position: absolute; width:100%; height:100%; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; }
      .room3d-face img { width:100%; height:100%; object-fit:cover; position:absolute; }
      .room3d-face--front { transform: rotateY(0deg) translateZ(150px); }
      .room3d-face--right { transform: rotateY(90deg) translateZ(150px); }
      .room3d-face--back  { transform: rotateY(180deg) translateZ(150px); }
      .room3d-face--left  { transform: rotateY(-90deg) translateZ(150px); }
      .room3d-face--top   { transform: rotateX(90deg) translateZ(105px); }
      .room3d-face--bottom{ transform: rotateX(-90deg) translateZ(105px); }

      /* Mobile */
      @media (max-width: 768px) {
        .hamburger { display: block !important; background: none; border: none; }
        .hamburger span { display: block; width: 22px; height: 2px; background: #fff; margin: 4px; }
        .desk-nav { display: none !important; }
        .mob-menu { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; bottom: 0; background: rgba(26,26,46,0.98); padding: 24px; z-index: 99; }
        .mob-menu span { color: #fff; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .g-stats { grid-template-columns: 1fr 1fr !important; }
        .g-rooms { grid-template-columns: 1fr !important; }
        .room-row { flex-direction: column !important; }
        .hero-inner { padding: 0 20px !important; }
        .hero-title { font-size: 32px !important; }
      }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const HOTEL = "The Grand Meridian";

const ROOMS = [
  { id:"economy", name:"Economy Room", price:1000, color:"#2563EB", lightBg:"#EFF6FF",
    roomNos:["101","102","103","104","105","106","107","108","109","110"],
    img:"https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=900&auto=format&fit=crop&q=80",
    img2:"https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=900&auto=format&fit=crop&q=80",
    img3:"https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=900&auto=format&fit=crop&q=80",
    amenities:["Free WiFi","32\" Smart TV","Air Conditioning","Daily Housekeeping","Work Desk","Electronic Safe"],
    meals:[], badge:null,
    desc:"Comfortable and well-appointed rooms ideal for solo travelers. Modern furnishings with all essential amenities for a perfect stay." },
  { id:"couple", name:"Couple Suite", price:2500, color:"#DB2777", lightBg:"#FDF2F8",
    roomNos:["201","202","203","204","205","206","207","208","209","210"],
    img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=900&auto=format&fit=crop&q=80",
    img2:"https://images.unsplash.com/photo-1590490360182-c33d57733427?w=900&auto=format&fit=crop&q=80",
    img3:"https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=900&auto=format&fit=crop&q=80",
    amenities:["Free WiFi","King-size Bed","Private Jacuzzi","Complimentary Breakfast","Room Service 24/7","Champagne Welcome","City View"],
    meals:["Complimentary Breakfast"], badge:"Most Popular",
    desc:"Romantic suites designed for couples with plush king bed, private jacuzzi and stunning city views." },
  { id:"premium", name:"Premium Room", price:5000, color:"#7C3AED", lightBg:"#F5F3FF",
    roomNos:["301","302","303","304","305","306","307","308","309","310"],
    img:"https://images.unsplash.com/photo-1590490360182-c33d57733427?w=900&auto=format&fit=crop&q=80",
    img2:"https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=900&auto=format&fit=crop&q=80",
    img3:"https://images.unsplash.com/photo-1596394516093-501ba68a0ba6?w=900&auto=format&fit=crop&q=80",
    amenities:["Free WiFi","King-size Bed","Executive Lounge","Complimentary Breakfast","Premium Mini Bar","Evening Turndown","Concierge","Bathrobe & Slippers"],
    meals:["Complimentary Breakfast"], badge:"Premium",
    desc:"Premium experience with exclusive lounge access, premium mini bar and personalized concierge." },
  { id:"presidential", name:"Presidential Suite", price:8000, color:"#B45309", lightBg:"#FFFBEB",
    roomNos:["401","402","403","404","405"],
    img:"https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=900&auto=format&fit=crop&q=80",
    img2:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=900&auto=format&fit=crop&q=80",
    img3:"https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=900&auto=format&fit=crop&q=80",
    amenities:["Free WiFi","Huge Private Balcony","Butler Service 24/7","All Meals Included","Private Pool Access","Spa Access","Airport Transfer","Premium Bar","Separate Living Room"],
    meals:["Breakfast","Lunch","Dinner"], badge:"Luxury",
    desc:"The pinnacle of luxury with a massive private balcony, panoramic views, dedicated butler, and all-inclusive dining." },
];

const fmtINR = n => "₹" + Number(n).toLocaleString("en-IN");

const S = {
  btn: (bg, c="#fff") => ({ background:bg, color:c, border:"none", padding:"12px 26px", borderRadius:10, fontWeight:700, fontSize:15, cursor:"pointer", transition:"all .2s", display:"inline-flex", alignItems:"center", gap:8, justifyContent:"center" }),
  outBtn: c => ({ background:"transparent", color:c, border:`1.5px solid ${c}`, padding:"11px 24px", borderRadius:10, fontWeight:700, fontSize:15, cursor:"pointer", transition:"all .2s" }),
  input: { width:"100%", padding:"12px 16px", borderRadius:10, border:"1.5px solid #e0e0e0", fontSize:15, outline:"none", boxSizing:"border-box", background:"#fff", color:"#222", fontFamily:"inherit", transition:"border-color .2s" },
  card: { background:"#fff", borderRadius:18, boxShadow:"0 2px 24px rgba(0,0,0,0.07)", overflow:"hidden" },
  sec: { maxWidth:1200, margin:"0 auto", padding:"72px 24px" },
};

function Navbar({ setPage, currentUser, handleLogout }) {
  const [isOpen, setIsOpen] = useState(false);
  return (
    <nav style={{ background: "var(--darker)", padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", color: "#fff", position: "sticky", top: 0, zIndex: 1000 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 32, height: 32, background: "var(--gold)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 18 }}>⭐</div>
        <span className="playfair" style={{ fontWeight: 800, fontSize: 20 }}>{HOTEL}</span>
      </div>
      <div className="desk-nav" style={{ display: "flex", gap: 32, fontSize: 14, fontWeight: 600 }}>
        <span onClick={() => setPage("landing")} style={{ cursor: "pointer" }}>Home</span>
        <span onClick={() => setPage("rooms")} style={{ cursor: "pointer" }}>Rooms</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
        <div className="desk-nav">
          <button onClick={() => setPage("login")} style={S.btn("var(--gold)")}>Login</button>
        </div>
        <button className="hamburger" onClick={() => setIsOpen(!isOpen)} style={{ display: "none" }}>
          <span></span><span></span><span></span>
        </button>
      </div>
      {isOpen && (
        <div className="mob-menu">
          <span onClick={() => { setPage("landing"); setIsOpen(false); }}>Home</span>
          <span onClick={() => { setPage("rooms"); setIsOpen(false); }}>Rooms</span>
          <span onClick={() => { setPage("login"); setIsOpen(false); }}>Login</span>
        </div>
      )}
    </nav>
  );
}

function LandingPage({ setPage }) {
  return (
    <div>
      <div style={{ position:"relative", height:500, overflow:"hidden", background:"var(--dark)", display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center", color:"#fff", padding:20 }}>
        <div className="hero-inner">
          <h1 className="playfair hero-title" style={{ fontSize:48, marginBottom:24 }}>Experience True Luxury & Comfort</h1>
          <button onClick={() => setPage("rooms")} style={{ ...S.btn("var(--gold)"), padding:"16px 40px", fontSize:18 }}>Browse Rooms</button>
        </div>
      </div>
      <div className="sec-mob" style={S.sec}>
        <div className="g-rooms" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 32 }}>
          {ROOMS.map(r => (
            <div key={r.id} style={S.card}>
              <img src={r.img} style={{ width: "100%", height: 200, objectFit: "cover" }} />
              <div style={{ padding: 24 }}>
                <h3 className="playfair">{r.name}</h3>
                <p style={{ color: "#666", fontSize: 14, margin: "12px 0" }}>{r.desc}</p>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 22, fontWeight: 800, color: "var(--gold)" }}>{fmtINR(r.price)}</span>
                  <button onClick={() => setPage("rooms")} style={S.btn("var(--dark)")}>Details</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LoginPage({ handleLogin, setPage }) {
  const [email, setEmail] = useState("");
  return (
    <div style={{ padding: 100, textAlign: "center", maxWidth: 400, margin: "0 auto" }}>
      <h2 className="playfair" style={{ marginBottom: 24 }}>Login</h2>
      <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Enter your email" style={S.input} />
      <button onClick={() => handleLogin({ email, name: "Guest" })} style={{ ...S.btn("var(--dark)"), width: "100%", marginTop: 16 }}>Sign In</button>
    </div>
  );
}

function RoomsPage() {
  return <div style={{ padding: 100, textAlign: "center" }}><h2 className="playfair">Our Rooms</h2><p>Booking system coming soon!</p></div>;
}

function Footer() {
  return <footer style={{ background: "var(--darker)", color: "#555", padding: 40, textAlign: "center", fontSize: 12 }}>© 2026 THE GRAND MERIDIAN HOTEL</footer>;
}

function App() {
  const [page, setPage] = useState("landing");
  const [currentUser, setCurrentUser] = useState(null);
  const handleLogin = (u) => { setCurrentUser(u); setPage("landing"); };
  const handleLogout = () => { setCurrentUser(null); setPage("landing"); };

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <Navbar setPage={setPage} currentUser={currentUser} handleLogout={handleLogout} />
      <main style={{ flex: 1 }}>
        {page === "landing" && <LandingPage setPage={setPage} />}
        {page === "rooms" && <RoomsPage />}
        {page === "login" && <LoginPage handleLogin={handleLogin} setPage={setPage} />}
      </main>
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
