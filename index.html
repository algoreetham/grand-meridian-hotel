<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Meridian — 5-Star Luxury Hotel, Bengaluru</title>
    <meta name="description" content="Experience true luxury at The Grand Meridian. Premium rooms from ₹1,000/night.">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --dark: #1a1a2e; --gold: #B8860B; --bg: #f8f6f0; }
      body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; }
      .playfair { font-family: 'Playfair Display', serif; }
      .sr { opacity: 0; transform: translateY(20px); transition: 0.8s; }
      .sr.vis { opacity: 1; transform: translateY(0); }
      @media (max-width: 768px) {
        .desk-nav { display: none !important; }
        .mob-menu { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; bottom: 0; background: #1a1a2e; padding: 30px; z-index: 99; }
        .mob-menu span { color: #fff; font-size: 20px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
      }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useRef } = React;
const HOTEL = "The Grand Meridian";
const ROOMS = [
  { id:"economy", name:"Economy Room", price:1000, color:"#2563EB", lightBg:"#EFF6FF", roomNos:["101","102"], img:"https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=900&auto=format&fit=crop&q=80", desc:"Modern furnishings with all essential amenities." },
  { id:"couple", name:"Couple Suite", price:2500, color:"#DB2777", lightBg:"#FDF2F8", roomNos:["201","202"], img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=900&auto=format&fit=crop&q=80", desc:"Romantic suites with plush king bed and jacuzzi." },
  { id:"premium", name:"Premium Room", price:5000, color:"#7C3AED", lightBg:"#F5F3FF", roomNos:["301","302"], img:"https://images.unsplash.com/photo-1590490360182-c33d57733427?w=900&auto=format&fit=crop&q=80", desc:"Exclusive lounge access and premium mini bar." },
  { id:"presidential", name:"Presidential Suite", price:8000, color:"#B45309", lightBg:"#FFFBEB", roomNos:["401"], img:"https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=900&auto=format&fit=crop&q=80", desc:"Massive private balcony and panoramic views." },
];

const MENU = {
  Breakfast:[{n:"Masala Dosa",p:180},{n:"Idli Sambar",p:150},{n:"Aloo Paratha",p:190}],
  Lunch:[{n:"Veg Thali",p:250},{n:"Chicken Biryani",p:380}],
  Dinner:[{n:"Butter Chicken",p:420},{n:"Dal Makhani",p:320}],
};
const AMENITY_DATA = [
  { icon:"🏊", title:"Swimming Pool", img:"https://images.unsplash.com/photo-1571896349842-33c89424de2d", desc:"Olympic size heated pool.", tag:"Complimentary", hours:"6 AM - 10 PM" },
  { icon:"💆", title:"Spa & Wellness", img:"https://images.unsplash.com/photo-1544161515-4ab6ce6db874", desc:"Traditional Ayurvedic treatments.", tag:"Advance booking", hours:"9 AM - 9 PM" },
];
const fmtINR = n => "₹" + Number(n).toLocaleString("en-IN");
function useScrollReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) e.target.classList.add('vis'); }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function Navbar({ setPage }) {
  return <nav style={{background:"#101020",padding:"15px 30px",display:"flex",justifyContent:"space-between",alignItems:"center",color:"#fff"}}>
    <span style={{fontWeight:900,fontSize:20}}>{HOTEL}</span>
    <div style={{display:"flex",gap:20,fontSize:14,fontWeight:600}}>
      <span onClick={()=>setPage("landing")} style={{cursor:"pointer"}}>Home</span>
      <span onClick={()=>setPage("rooms")} style={{cursor:"pointer"}}>Rooms</span>
    </div>
  </nav>;
}
function LandingPage({ setPage }) {
  return <div>
    <div style={{height:500,background:"#1a1a2e",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",color:"#fff",textAlign:"center",padding:20}}>
      <h1 className="playfair" style={{fontSize:48,marginBottom:20}}>Experience True Luxury</h1>
      <button onClick={()=>setPage("rooms")} style={{padding:"16px 40px",background:"#B8860B",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:18,cursor:"pointer"}}>Browse Rooms</button>
    </div>
    <div style={{padding:60,maxWidth:1000,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:40}}>
      {ROOMS.map(r => (
        <div key={r.id} style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
          <img src={r.img} style={{width:"100%",height:220,objectFit:"cover"}} />
          <div style={{padding:24}}>
            <h3 className="playfair" style={{fontSize:22,marginBottom:10}}>{r.name}</h3>
            <p style={{color:"#666",fontSize:15,marginBottom:20}}>{r.desc}</p>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:24,fontWeight:800,color:"#B8860B"}}>{fmtINR(r.price)}</span>
              <button onClick={()=>setPage("rooms")} style={{padding:"10px 20px",background:"#1a1a2e",color:"#fff",borderRadius:8}}>Details</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  </div>;
}
function RoomsPage() {
  return <div style={{padding:60,textAlign:"center"}}>
    <h2 className="playfair" style={{fontSize:32}}>Our Rooms</h2>
    <p style={{color:"#888"}}>Real-time booking coming soon.</p>
  </div>;
}
function App() {
  const [page, setPage] = useState("landing");
  return <div>
    <Navbar setPage={setPage} />
    {page === "landing" && <LandingPage setPage={setPage} />}
    {page === "rooms" && <RoomsPage />}
    <footer style={{background:"#0f0f12",color:"#444",padding:40,textAlign:"center",fontSize:12}}>
      © 2026 THE GRAND MERIDIAN HOTEL
    </footer>
  </div>;
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
